<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Nga AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CÁC HÀM AI & XỬ LÝ DỮ LIỆU ---

        async function fetchWithRetry(url, options, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status === 429) {
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }
                    throw new Error(`HTTP Error: ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        async function processVocabularyBatch(pairs, apiKey) {
            const prompt = `Bạn là chuyên gia tiếng Nga. Thêm trọng âm (dấu sắc) vào nguyên âm được nhấn mạnh của từ tiếng Nga và chọn 1 Emoji minh họa chính xác nhất cho nghĩa của từ đó. Trả về mảng JSON. Định dạng: [{"original": "собака", "stressed": "собáка", "meaning": "con chó", "emoji": "🐕"}]`;
            const text = pairs.map(p => `${p.ru} - ${p.vi}`).join('\n');
            
            try {
                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                return JSON.parse(result.candidates[0].content.parts[0].text);
            } catch (e) {
                console.error(e);
                return pairs.map(p => ({ original: p.ru, stressed: p.ru, meaning: p.vi, emoji: "📝" }));
            }
        }

        async function getAIAudio(text, apiKey) {
            try {
                const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Đọc to, rõ ràng bằng giọng nam tiếng Nga: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                        }
                    })
                });
                const base64Pcm = result.candidates[0].content.parts[0].inlineData.data;
                const binaryString = atob(base64Pcm);
                const pcmBuffer = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) pcmBuffer[i] = binaryString.charCodeAt(i);
                
                const wavHeader = new ArrayBuffer(44);
                const view = new DataView(wavHeader);
                const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
                
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + pcmBuffer.byteLength, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); 
                view.setUint16(22, 1, true); 
                view.setUint32(24, 24000, true); 
                view.setUint32(28, 24000 * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmBuffer.byteLength, true);
                
                const wavBlob = new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' });
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(wavBlob);
                });
            } catch (e) { return null; }
        }

        const fallbackTTS = (text) => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        };

        // --- GIAO DIỆN CHÍNH ---

        function App() {
            const [apiKey, setApiKey] = useState("");
            const [isAuth, setIsAuth] = useState(false);
            const [decks, setDecks] = useState([]);
            const [cards, setCards] = useState([]);
            const [currentDeckId, setCurrentDeckId] = useState(null);
            const [view, setView] = useState('auth'); // auth, home, detail, study
            const [loading, setLoading] = useState({ active: false, msg: "", current: 0, total: 0 });

            const handleLogin = () => {
                if (apiKey.trim().length > 20) {
                    setIsAuth(true);
                    setView('home');
                } else {
                    alert("Vui lòng nhập API Key hợp lệ!");
                }
            };

            const createDeck = (name) => {
                const newDeck = { id: Date.now().toString(), name, createdAt: Date.now() };
                setDecks([newDeck, ...decks]);
            };

            const deleteDeck = (id) => {
                setDecks(decks.filter(d => d.id !== id));
                setCards(cards.filter(c => c.deckId !== id));
            };

            const processBatch = async (deckId, text) => {
                if (!text.trim()) return;
                setLoading({ active: true, msg: "Đang phân tích...", current: 0, total: 0 });

                const lines = text.split('\n').filter(l => l.trim());
                const rawPairs = lines.map(line => {
                    const parts = line.split(/[-–—:]/);
                    if (parts.length >= 2) return { ru: parts[0].trim(), vi: parts.slice(1).join('-').trim() };
                    return null;
                }).filter(p => p !== null);

                if (rawPairs.length === 0) {
                    setLoading({ active: false, msg: "", current: 0, total: 0 });
                    return;
                }

                try {
                    setLoading(p => ({ ...p, msg: "AI đang chọn Emoji & Trọng âm...", total: rawPairs.length }));
                    const processedData = await processVocabularyBatch(rawPairs, apiKey);
                    const newCards = [];

                    for (let i = 0; i < processedData.length; i++) {
                        const item = processedData[i];
                        setLoading(p => ({ ...p, msg: `Đang tạo phát âm: ${item.stressed}`, current: i + 1 }));
                        const aud = await getAIAudio(item.stressed, apiKey);
                        
                        newCards.push({
                            id: Math.random().toString(36).substr(2, 9),
                            deckId,
                            ru: item.original,
                            stressed: item.stressed,
                            vi: item.meaning,
                            emoji: item.emoji || "📝",
                            audio: aud || "",
                            createdAt: Date.now()
                        });
                    }
                    setCards([...newCards, ...cards]);
                } catch (e) {
                    console.error(e);
                } finally {
                    setLoading({ active: false, msg: "", current: 0, total: 0 });
                }
            };

            if (view === 'auth') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                        <div className="bg-white p-8 rounded-[2rem] shadow-xl max-w-sm w-full text-center border border-blue-100">
                            <div className="text-6xl mb-6">🔑</div>
                            <h1 className="text-2xl font-black text-blue-900 mb-2">Khởi động Ứng dụng</h1>
                            <p className="text-slate-500 text-sm mb-6 font-medium">Nhập Gemini API Key của bạn để sử dụng AI (Mã của bạn không được lưu lại để đảm bảo an toàn).</p>
                            <input 
                                type="password" 
                                placeholder="Dán API Key vào đây..." 
                                className="w-full bg-slate-50 px-4 py-4 rounded-2xl mb-4 border border-slate-200 outline-none focus:border-blue-500 transition"
                                value={apiKey} onChange={e => setApiKey(e.target.value)}
                            />
                            <button onClick={handleLogin} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 active:scale-95 transition shadow-lg shadow-blue-200">
                                VÀO HỌC NGAY
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-4 md:p-6 pb-20">
                    <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex items-center gap-2">
                            <span className="bg-blue-600 text-white p-2 rounded-2xl text-xl">📖</span>
                            <h1 className="text-xl font-black text-blue-900 tracking-tight">Học Từ Vựng</h1>
                        </div>
                        <span className="bg-slate-100 text-slate-500 font-bold text-[10px] px-2 py-1 rounded-md uppercase">Phiên tạm thời</span>
                    </header>

                    {view === 'home' && <DeckList decks={decks} onCreate={createDeck} onDelete={deleteDeck} onOpen={id => { setCurrentDeckId(id); setView('detail'); }} />}
                    
                    {view === 'detail' && <DeckDetail 
                        deck={decks.find(d => d.id === currentDeckId)} 
                        cards={cards.filter(c => c.deckId === currentDeckId)}
                        onBack={() => setView('home')} 
                        onAddBatch={processBatch}
                        onStudy={() => setView('study')}
                        onDeleteCard={id => setCards(cards.filter(c => c.id !== id))}
                    />}
                    
                    {view === 'study' && <StudyView 
                        cards={cards.filter(c => c.deckId === currentDeckId)} 
                        onBack={() => setView('detail')} 
                    />}

                    {loading.active && (
                        <div className="fixed inset-0 bg-white/95 z-50 flex items-center justify-center p-6 text-center backdrop-blur-sm">
                            <div className="max-w-xs w-full bg-slate-50 p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                <div className="text-5xl mb-4 animate-bounce">🤖</div>
                                <h2 className="text-xl font-black text-slate-900 mb-2">Đang chế tạo thẻ...</h2>
                                <p className="text-slate-500 font-medium mb-6 text-sm">{loading.msg}</p>
                                <div className="h-2 bg-slate-200 rounded-full overflow-hidden w-full relative mb-2">
                                    <div className="absolute top-0 left-0 h-full bg-blue-600 transition-all duration-300 rounded-full" style={{ width: `${(loading.current / loading.total) * 100}%` }}/>
                                </div>
                                <p className="text-xs text-blue-600 font-black tracking-widest">{loading.current} / {loading.total} TỪ</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function DeckList({ decks, onCreate, onDelete, onOpen }) {
            const [name, setName] = useState("");
            return (
                <div className="space-y-6">
                    <div className="bg-white p-3 rounded-[2rem] border border-slate-200 shadow-sm flex gap-2">
                        <input className="flex-1 bg-slate-50 px-5 py-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-medium" placeholder="Nhập tên bộ thẻ (VD: Bài 1)..." value={name} onChange={e => setName(e.target.value)} onKeyDown={e => { if(e.key==='Enter' && name) {onCreate(name); setName("");}}} />
                        <button onClick={() => { if(name) { onCreate(name); setName(""); }}} className="bg-blue-600 text-white px-6 rounded-2xl font-black active:scale-95 transition">TẠO</button>
                    </div>
                    {decks.length === 0 && <div className="text-center p-10 text-slate-400 font-medium border-2 border-dashed border-slate-200 rounded-3xl">Chưa có bộ thẻ nào. Hãy tạo bộ thẻ đầu tiên!</div>}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {decks.map(d => (
                            <div key={d.id} className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm relative group cursor-pointer" onClick={() => onOpen(d.id)}>
                                <h3 className="text-xl font-black text-slate-800 mb-1">{d.name}</h3>
                                <p className="text-blue-500 text-xs font-bold uppercase tracking-widest mt-2">Mở bộ thẻ</p>
                                <button onClick={e => { e.stopPropagation(); onDelete(d.id); }} className="absolute top-6 right-6 text-slate-300 hover:text-red-500 text-xl">🗑️</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function DeckDetail({ deck, cards, onBack, onAddBatch, onStudy, onDeleteCard }) {
            const [input, setInput] = useState("");
            return (
                <div className="space-y-6">
                    <button onClick={onBack} className="font-black text-slate-400 hover:text-blue-600 text-sm">🔙 TRỞ VỀ</button>
                    <div className="bg-white p-6 rounded-[3rem] shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row justify-between items-start gap-4 mb-8">
                            <div><h2 className="text-3xl font-black text-slate-900">{deck.name}</h2><p className="text-slate-500 font-bold mt-1">{cards.length} thẻ vựng</p></div>
                            <button disabled={cards.length === 0} onClick={onStudy} className="w-full md:w-auto bg-green-500 text-white px-10 py-4 rounded-2xl font-black text-lg disabled:opacity-50">BẮT ĐẦU HỌC</button>
                        </div>
                        <div className="bg-blue-50/70 p-6 rounded-[2rem] mb-8 border border-blue-100">
                            <label className="block text-xs font-black text-blue-900 uppercase tracking-widest mb-2">Dán danh sách từ (Mỗi dòng 1 từ)</label>
                            <textarea className="w-full h-32 bg-white rounded-2xl p-4 outline-none border border-blue-200 focus:border-blue-500 transition mb-4 font-medium resize-none shadow-sm" placeholder="собака - con chó&#10;машина: xe hơi" value={input} onChange={e => setInput(e.target.value)} />
                            <button onClick={() => { onAddBatch(deck.id, input); setInput(""); }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition active:scale-95">TẠO THẺ THÔNG MINH</button>
                        </div>
                        <div className="grid gap-3">
                            {cards.map(c => (
                                <div key={c.id} className="flex items-center gap-4 p-3 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                    <div className="w-14 h-14 bg-white rounded-xl flex items-center justify-center text-3xl shadow-sm border border-slate-200">{c.emoji}</div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2"><h4 className="font-black text-slate-800 text-base truncate">{c.stressed}</h4><span className="text-sm">{c.audio ? "🔊" : "🔈"}</span></div>
                                        <p className="text-slate-500 font-bold uppercase text-[10px] tracking-widest mt-0.5">{c.vi}</p>
                                    </div>
                                    <button onClick={() => onDeleteCard(c.id)} className="text-slate-300 hover:text-red-500 p-2 text-xl">🗑️</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function StudyView({ cards, onBack }) {
            const [index, setIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const card = cards[index];

            const playAudio = () => {
                if (!card) return;
                if (card.audio) { const a = new Audio(card.audio); a.play().catch(() => fallbackTTS(card.ru)); }
                else fallbackTTS(card.ru);
            };

            useEffect(() => { if (flipped) playAudio(); }, [flipped, index]);
            if (cards.length === 0) return null;

            return (
                <div className="flex flex-col items-center">
                    <div className="w-full flex justify-between items-center mb-8 px-2">
                        <button onClick={onBack} className="font-black text-slate-400 text-xs uppercase tracking-widest">THOÁT</button>
                        <div className="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full font-black text-xs uppercase shadow-sm">{index + 1} / {cards.length}</div>
                    </div>
                    <div className={`relative w-full max-w-sm h-[28rem] cursor-pointer transition-transform duration-500 transform-style-3d ${flipped ? 'rotate-y-180' : ''}`} onClick={() => setFlipped(!flipped)}>
                        <div className="absolute inset-0 backface-hidden bg-white rounded-[3rem] shadow-xl border border-slate-200 flex flex-col items-center justify-center p-8 gap-6">
                            <div className="w-40 h-40 bg-slate-50 rounded-[2rem] flex items-center justify-center text-[6rem] shadow-inner border border-slate-100">{card.emoji}</div>
                            <div className="text-center w-full"><span className="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-2">Nghĩa Tiếng Việt</span><h2 className="text-3xl font-black text-slate-800 leading-tight">{card.vi}</h2></div>
                        </div>
                        <div className="absolute inset-0 backface-hidden bg-blue-600 rounded-[3rem] shadow-xl rotate-y-180 flex flex-col items-center justify-center p-8 text-white gap-8 border-4 border-blue-400">
                            <div className="text-center w-full"><span className="text-[10px] font-bold text-blue-200 uppercase tracking-widest block mb-4">Tiếng Nga</span><h2 className="text-4xl font-black mb-2 leading-tight">{card.stressed}</h2></div>
                            <div className="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center shadow-lg active:scale-90 text-5xl" onClick={e => { e.stopPropagation(); playAudio(); }}>🔊</div>
                            <p className="text-blue-200 font-bold text-[10px] uppercase tracking-widest">Phát âm</p>
                        </div>
                    </div>
                    <button onClick={() => { setFlipped(false); setTimeout(() => { if (index < cards.length - 1) setIndex(index + 1); else setIndex(0); }, 300); }} className="mt-10 w-full max-w-sm bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 uppercase tracking-widest">{index === cards.length - 1 ? 'LÀM LẠI' : 'TIẾP THEO'}</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
